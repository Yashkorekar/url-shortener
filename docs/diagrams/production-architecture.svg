<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-labelledby="title desc">
  <title id="title">Production architecture for URL shortener</title>
  <desc id="desc">Users go through CDN, WAF, and load balancer to multiple app instances, which connect to Redis, PostgreSQL, Kafka, analytics pipelines, and observability systems.</desc>
  <defs>
    <style>
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #1f2937; stroke-width: 2; rx: 18; ry: 18; }
      .infra { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 18; ry: 18; }
      .data { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 18; ry: 18; }
      .event { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 18; ry: 18; }
      .ops { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 18; ry: 18; }
      .text { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #0f172a; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 17px; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; }
      .dashed { stroke-dasharray: 10 8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569" />
    </marker>
  </defs>

  <text class="title" x="40" y="50">Recommended production architecture</text>

  <rect class="infra" x="60" y="190" width="180" height="90" />
  <text class="text" x="150" y="228" text-anchor="middle">Users</text>
  <text class="small" x="150" y="256" text-anchor="middle">browser / API clients</text>

  <rect class="infra" x="300" y="190" width="180" height="90" />
  <text class="text" x="390" y="228" text-anchor="middle">CDN</text>
  <text class="small" x="390" y="256" text-anchor="middle">edge cache</text>

  <rect class="infra" x="540" y="190" width="180" height="90" />
  <text class="text" x="630" y="228" text-anchor="middle">WAF</text>
  <text class="small" x="630" y="256" text-anchor="middle">edge protection</text>

  <rect class="infra" x="780" y="190" width="220" height="90" />
  <text class="text" x="890" y="228" text-anchor="middle">Load Balancer</text>
  <text class="small" x="890" y="256" text-anchor="middle">ingress / TLS / health checks</text>

  <rect class="box" x="1080" y="80" width="200" height="90" />
  <text class="text" x="1180" y="118" text-anchor="middle">App instance 1</text>
  <text class="small" x="1180" y="146" text-anchor="middle">stateless Spring Boot</text>

  <rect class="box" x="1080" y="220" width="200" height="90" />
  <text class="text" x="1180" y="258" text-anchor="middle">App instance 2</text>
  <text class="small" x="1180" y="286" text-anchor="middle">stateless Spring Boot</text>

  <rect class="box" x="1080" y="360" width="200" height="90" />
  <text class="text" x="1180" y="398" text-anchor="middle">App instance N</text>
  <text class="small" x="1180" y="426" text-anchor="middle">horizontal scale</text>

  <rect class="data" x="1060" y="560" width="220" height="100" />
  <text class="text" x="1170" y="604" text-anchor="middle">Redis cluster</text>
  <text class="small" x="1170" y="632" text-anchor="middle">cache + rate limiting</text>

  <rect class="data" x="1320" y="520" width="220" height="100" />
  <text class="text" x="1430" y="564" text-anchor="middle">PostgreSQL</text>
  <text class="small" x="1430" y="592" text-anchor="middle">primary / durable OLTP store</text>

  <rect class="data" x="1320" y="670" width="220" height="100" />
  <text class="text" x="1430" y="714" text-anchor="middle">Read replicas</text>
  <text class="small" x="1430" y="742" text-anchor="middle">optional read scale-out</text>

  <rect class="event" x="780" y="560" width="220" height="100" />
  <text class="text" x="890" y="604" text-anchor="middle">Kafka cluster</text>
  <text class="small" x="890" y="632" text-anchor="middle">create / access events</text>

  <rect class="event" x="780" y="700" width="220" height="100" />
  <text class="text" x="890" y="744" text-anchor="middle">Analytics</text>
  <text class="small" x="890" y="772" text-anchor="middle">consumers / pipelines</text>

  <rect class="ops" x="500" y="560" width="220" height="100" />
  <text class="text" x="610" y="604" text-anchor="middle">Observability</text>
  <text class="small" x="610" y="632" text-anchor="middle">metrics / logs / tracing</text>

  <line class="arrow" x1="240" y1="235" x2="300" y2="235" marker-end="url(#arrow)" />
  <line class="arrow" x1="480" y1="235" x2="540" y2="235" marker-end="url(#arrow)" />
  <line class="arrow" x1="720" y1="235" x2="780" y2="235" marker-end="url(#arrow)" />
  <line class="arrow" x1="1000" y1="235" x2="1080" y2="125" marker-end="url(#arrow)" />
  <line class="arrow" x1="1000" y1="235" x2="1080" y2="265" marker-end="url(#arrow)" />
  <line class="arrow" x1="1000" y1="235" x2="1080" y2="405" marker-end="url(#arrow)" />

  <path class="arrow" d="M1180 170 L1180 520" marker-end="url(#arrow)" />
  <path class="arrow" d="M1180 310 L1180 520" marker-end="url(#arrow)" />
  <path class="arrow" d="M1180 450 L1180 520" marker-end="url(#arrow)" />

  <path class="arrow" d="M1280 610 L1320 610" marker-end="url(#arrow)" />
  <path class="arrow dashed" d="M1430 620 L1430 670" marker-end="url(#arrow)" />

  <path class="arrow" d="M1080 125 L1000 610" marker-end="url(#arrow)" />
  <path class="arrow" d="M1080 265 L1000 610" marker-end="url(#arrow)" />
  <path class="arrow" d="M1080 405 L1000 610" marker-end="url(#arrow)" />
  <path class="arrow" d="M1000 610 L780 610" marker-end="url(#arrow)" />
  <path class="arrow" d="M890 660 L890 700" marker-end="url(#arrow)" />

  <path class="arrow" d="M1080 125 L720 610" marker-end="url(#arrow)" />
  <path class="arrow" d="M1080 265 L720 610" marker-end="url(#arrow)" />
  <path class="arrow" d="M1080 405 L720 610" marker-end="url(#arrow)" />

  <text class="small" x="1135" y="536">shared state</text>
  <text class="small" x="825" y="534">async event path</text>
  <text class="small" x="1365" y="652">replication</text>
  <text class="small" x="556" y="534">visibility + alerting</text>
</svg>
