<svg xmlns="http://www.w3.org/2000/svg" width="1580" height="980" viewBox="0 0 1580 980" role="img" aria-labelledby="title desc">
  <title id="title">Redirect request flow</title>
  <desc id="desc">Sequence diagram for GET short code, showing cache-first lookup, database fallback, asynchronous Kafka event publishing, and redirect response.</desc>
  <defs>
    <style>
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #0f172a; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 14; ry: 14; }
      .life { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; }
      .txt { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; fill: #0f172a; font-weight: 600; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 15px; fill: #334155; }
      .msg { stroke: #2563eb; stroke-width: 3; fill: none; }
      .ret { stroke: #64748b; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; }
      .alt { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 10 6; rx: 14; ry: 14; }
      .note { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; rx: 12; ry: 12; }
      .warn { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; rx: 12; ry: 12; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 16px; fill: #1e293b; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb" />
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b" />
    </marker>
  </defs>

  <text class="title" x="40" y="48">GET /{shortCode} — redirect flow</text>

  <g>
    <rect class="lane" x="30" y="80" width="120" height="60" />
    <text class="txt" x="90" y="115" text-anchor="middle">Client</text>
    <line class="life" x1="90" y1="140" x2="90" y2="920" />

    <rect class="lane" x="180" y="80" width="220" height="60" />
    <text class="txt" x="290" y="110" text-anchor="middle">UrlShortener</text>
    <text class="small" x="290" y="132" text-anchor="middle">Controller</text>
    <line class="life" x1="290" y1="140" x2="290" y2="920" />

    <rect class="lane" x="430" y="80" width="220" height="60" />
    <text class="txt" x="540" y="110" text-anchor="middle">UrlShortener</text>
    <text class="small" x="540" y="132" text-anchor="middle">Service</text>
    <line class="life" x1="540" y1="140" x2="540" y2="920" />

    <rect class="lane" x="680" y="80" width="160" height="60" />
    <text class="txt" x="760" y="115" text-anchor="middle">Redis Cache</text>
    <line class="life" x1="760" y1="140" x2="760" y2="920" />

    <rect class="lane" x="870" y="80" width="180" height="60" />
    <text class="txt" x="960" y="110" text-anchor="middle">H2 / JPA</text>
    <text class="small" x="960" y="132" text-anchor="middle">Repository + DB</text>
    <line class="life" x1="960" y1="140" x2="960" y2="920" />

    <rect class="lane" x="1080" y="80" width="120" height="60" />
    <text class="txt" x="1140" y="115" text-anchor="middle">Kafka</text>
    <line class="life" x1="1140" y1="140" x2="1140" y2="920" />

    <rect class="lane" x="1230" y="80" width="180" height="60" />
    <text class="txt" x="1320" y="110" text-anchor="middle">UrlEvent</text>
    <text class="small" x="1320" y="132" text-anchor="middle">Consumer</text>
    <line class="life" x1="1320" y1="140" x2="1320" y2="920" />

    <rect class="lane" x="1430" y="80" width="120" height="60" />
    <text class="txt" x="1490" y="115" text-anchor="middle">DB Write</text>
    <line class="life" x1="1490" y1="140" x2="1490" y2="920" />
  </g>

  <line class="msg" x1="90" y1="190" x2="290" y2="190" marker-end="url(#arrow)" />
  <text class="label" x="190" y="180" text-anchor="middle">1. GET /abc1234</text>

  <line class="msg" x1="290" y1="235" x2="540" y2="235" marker-end="url(#arrow)" />
  <text class="label" x="415" y="225" text-anchor="middle">2. getOriginalUrl(shortCode)</text>

  <line class="msg" x1="540" y1="280" x2="760" y2="280" marker-end="url(#arrow)" />
  <text class="label" x="650" y="270" text-anchor="middle">3. check Redis cache</text>

  <rect class="alt" x="500" y="310" width="580" height="220" />
  <text class="txt" x="525" y="336">Cache resolution</text>
  <text class="small" x="535" y="368">A) Cache HIT → Redis returns Url immediately</text>
  <text class="small" x="535" y="394">B) Cache MISS → query DB, then populate Redis with the result</text>

  <line class="ret" x1="760" y1="425" x2="540" y2="425" marker-end="url(#arrowGray)" />
  <text class="label" x="650" y="417" text-anchor="middle">4. Url / miss</text>
  <line class="msg" x1="540" y1="470" x2="960" y2="470" marker-end="url(#arrow)" />
  <text class="label" x="750" y="460" text-anchor="middle">5. findByShortCode on cache miss</text>
  <line class="ret" x1="960" y1="500" x2="540" y2="500" marker-end="url(#arrowGray)" />
  <text class="label" x="750" y="492" text-anchor="middle">6. Url / none</text>
  <line class="msg" x1="540" y1="540" x2="760" y2="540" marker-end="url(#arrow)" />
  <text class="label" x="650" y="530" text-anchor="middle">7. cache result (TTL ≈ 1h)</text>

  <rect class="warn" x="210" y="565" width="270" height="76" />
  <text class="small" x="345" y="595" text-anchor="middle">If URL is missing, controller returns</text>
  <text class="small" x="345" y="619" text-anchor="middle">404 Not Found and exits here.</text>

  <line class="msg" x1="290" y1="675" x2="1140" y2="675" marker-end="url(#arrow)" />
  <text class="label" x="715" y="665" text-anchor="middle">8. publish url.accessed (if Kafka enabled)</text>

  <line class="ret" x1="290" y1="730" x2="90" y2="730" marker-end="url(#arrowGray)" />
  <text class="label" x="190" y="722" text-anchor="middle">9. 302 redirect to long URL</text>

  <line class="ret" x1="1140" y1="780" x2="1320" y2="780" marker-end="url(#arrowGray)" />
  <text class="label" x="1230" y="772" text-anchor="middle">10. event delivery</text>
  <line class="msg" x1="1320" y1="825" x2="1490" y2="825" marker-end="url(#arrow)" />
  <text class="label" x="1405" y="815" text-anchor="middle">11. increment access count</text>

  <rect class="note" x="1115" y="610" width="340" height="98" />
  <text class="txt" x="1285" y="642" text-anchor="middle">Important production idea</text>
  <text class="small" x="1285" y="670" text-anchor="middle">Redirect response returns fast; analytics/write</text>
  <text class="small" x="1285" y="692" text-anchor="middle">work can happen asynchronously via Kafka.</text>

  <rect class="note" x="1180" y="845" width="330" height="72" />
  <text class="small" x="1345" y="874" text-anchor="middle">When Kafka is disabled, the controller/service can</text>
  <text class="small" x="1345" y="898" text-anchor="middle">increment access count synchronously instead.</text>
</svg>
