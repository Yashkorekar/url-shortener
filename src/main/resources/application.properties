spring.application.name=url-shortener

# Use PORT env variable for Render deployment, fallback to 8081 for local
server.port=${PORT:8081}

# Base URL for shortened links
app.base.url=${APP_BASE_URL:http://localhost:8081}

# Database Configuration - H2 File-Based (data persists in ./data/urlshortener.mv.db)
spring.datasource.url=jdbc:h2:file:./data/urlshortener;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (accessible at http://localhost:8081/h2-console for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.show-actuator=false
