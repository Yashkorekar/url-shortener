# Test properties - use H2 in-memory and NO-OP cache so tests don't need Redis or Kafka
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Redis for tests ? use simple in-memory cache
spring.cache.type=simple

# Disable Redis auto-configuration for tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Kafka ? fail-fast=false means topic creation timeout is logged but doesn't fail tests
# Short operation-timeout so KafkaAdmin gives up quickly (default is 30s, we want 1s in tests)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.admin.operation-timeout=1



